  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #f7f7f7 0%, #ffffff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }

    .logo {
      width: 76px;
      height: 76px;
      margin: 0 auto 24px;
      border-radius: 22px;
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    h1 {
      font-size: 26px;
      color: #111;
      margin-bottom: 18px;
      line-height: 1.3;
    }

    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 34px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      color: white;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .safe {
      margin-top: 18px;
      font-size: 13px;
      color: #999;
    }

      Perfil oficial

  <script>
    function trackLeadEvent() {
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Lead');
      }
    }
  </script>
